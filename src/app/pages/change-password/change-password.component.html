<div class="cp-wrap">
  <div class="cp-card">

    <div class="cp-logo">
      <div class="logo-icon"><i class="ti ti-bolt"></i></div>
      <span class="logo-text">HireFlow</span>
    </div>

    <div class="cp-icon">
      <i class="ti ti-lock-open"></i>
    </div>

    <h2 class="cp-title">Change your password</h2>
    <p class="cp-sub">Your account requires a password change before you can continue.</p>

    <!-- Success state -->
    <div class="success-box" *ngIf="success">
      <i class="ti ti-circle-check"></i>
      Password changed successfully! Redirecting to login...
    </div>

    <ng-container *ngIf="!success">

      <div class="error-box" *ngIf="error">
        <i class="ti ti-alert-circle"></i> {{ error }}
      </div>

      <form (ngSubmit)="submit()">

        <div class="form-group">
          <label>Current password</label>
          <input type="password" [(ngModel)]="currentPassword" name="currentPassword"
                 placeholder="Your current password" autocomplete="current-password">
        </div>

        <div class="form-group">
          <label>New password</label>
          <input type="password" [(ngModel)]="newPassword" name="newPassword"
                 placeholder="Min 10 characters" autocomplete="new-password"
                 [class.input-error]="tooShort">
          <div class="field-hint error" *ngIf="tooShort">Must be at least 10 characters.</div>
        </div>

        <div class="form-group">
          <label>Confirm new password</label>
          <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword"
                 placeholder="Repeat new password" autocomplete="new-password"
                 [class.input-error]="passwordMismatch">
          <div class="field-hint error" *ngIf="passwordMismatch">Passwords do not match.</div>
        </div>

        <button type="submit" class="btn btn-primary cp-btn" [disabled]="loading || !canSubmit">
          <i class="ti ti-loader-2 spin" *ngIf="loading"></i>
          <i class="ti ti-check" *ngIf="!loading"></i>
          {{ loading ? 'Changing...' : 'Change password' }}
        </button>

      </form>

    </ng-container>

  </div>
</div>
